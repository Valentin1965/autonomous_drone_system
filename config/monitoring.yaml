# ──────────────────────────────────────────────────────────────────────────
# Моніторинг рослин — конфіг СТАНЦІЇ (GCS)
# Окремо від CV ряду (інша камера / інший контур).
#
# Сервер аналізу — ОКРЕМИЙ блок (config/server.yaml, python -m server.main).
# Одна інстанція сервера обслуговує БАГАТО станцій.
# ──────────────────────────────────────────────────────────────────────────
enabled: true
default_crop: vineyard

# Ідентифікатор та оператор цієї станції (вирушають у кожному запиті до сервера)
station:
  id: gcs-1
  operator: ""          # ім'я оператора (опційно, задати перед роботою)

# ──────────────────────────────────────────────────────────────────────────
# Де знаходяться камери моніторингу відносно станції:
#   local  — камери підключені прямо до ноутбука GCS (webcam/file/synthetic)
#   rpi    — камери на RPi дрона; RPi надсилає JPEG через Wi-Fi на GCS API
#
# У полі: uplink.source: rpi, RPi POST на /api/monitoring/upload
# Для dev/sim: uplink.source: local
# ──────────────────────────────────────────────────────────────────────────
uplink:
  # Звідки надходять фото на станцію
  source: local           # local | rpi

  # RPi → станція (тільки для source: rpi)
  rpi:
    # Адреса RPi в локальній мережі (Wi-Fi 5 GHz)
    host: "192.168.1.20"
    port: 8081
    # Шлях, на який RPi надсилає знімки (PUT/POST)
    upload_path: "/api/monitoring/upload"
    # Скільки секунд чекати знімок від RPi на точці маршруту
    wait_timeout_s: 10.0
    upload_token: ""      # якщо задано — RPi надсилає X-Upload-Token
    wifi_band: "5GHz"    # для документації; не впливає на код

  # Канал станція → сервер аналізу
  to_server:
    channel: "5G_modem"  # 5G_modem | wifi | lan | vpn  (документація)
    # Якщо є VPN між станцією і сервером — записати host у remote.base_url
    notes: "5G-модем на станції → інтернет → HTTPS → сервер"

# ──────────────────────────────────────────────────────────────────────────
# Зв'язок зі сервером аналізу (YOLOv8 + SQLite)
# Сервер запускається окремо: python -m server.main --port 8090
# ──────────────────────────────────────────────────────────────────────────
remote:
  enabled: true
  # remote = HTTP POST до сервера аналізу (python -m server.main)
  # mock   = симуляція без мережі (лише для ізольованих unit-тестів)
  mode: remote
  base_url: "http://127.0.0.1:8090"
  analyze_path: "/api/v1/analyze"
  health_path: "/health"
  timeout_s: 45
  api_key: ""             # Bearer-токен (якщо сервер запущено з --api-key)

  # Надсилати події флоту (маршрут, oприскування, обстеження) без фото
  sync_events: true

  # Зберігати JPEG локально на станції перед відправкою (локальний архів)
  save_captures: true
  captures_dir: data/monitoring/captures

# ──────────────────────────────────────────────────────────────────────────
# Черга офлайн-відправки
# Якщо 5G-з'єднання пропало — запити зберігаються на диск станції
# і автоматично досилаються при відновленні зв'язку.
# ──────────────────────────────────────────────────────────────────────────
offline_queue:
  enabled: true
  # Папка черги на диску станції
  queue_dir: data/monitoring/outbox
  # Затримка між спробами retry (секунди)
  retry_interval_s: 30
  # Максимум спроб на один елемент (0 = нескінченно)
  max_retries: 0
  # Максимальний розмір черги (елементів); старі видаляються при переповненні
  max_queue_size: 500
  # Затримка (сек) між запитами під час flush (щоб не спамити сервер)
  flush_delay_s: 0.5

# ──────────────────────────────────────────────────────────────────────────
# Дві камери моніторингу (ліва / права сторона міжряддя)
# type: webcam | rtsp | file | synthetic
# Використовується лише якщо uplink.source: local
# ──────────────────────────────────────────────────────────────────────────
cameras:
  left:
    type: synthetic
    source: "0"
    label: "Ліва (ряд)"
  right:
    type: synthetic
    source: "1"
    label: "Права (ряд)"

# ──────────────────────────────────────────────────────────────────────────
crops:
  vineyard:
    name: "Виноград"
    issue_labels:
      - downy_mildew
      - powdery_mildew
      - black_rot
      - spider_mite
      - leaf_blight
  banana:
    name: "Банан"
    issue_labels:
      - black_sigatoka
      - panama_disease
      - banana_weevil
      - leaf_spot
  cocoa:
    name: "Какао"
    issue_labels:
      - black_pod
      - witches_broom
      - frosty_pod_rot
      - swollen_shoot

# ──────────────────────────────────────────────────────────────────────────
survey:
  dwell_s: 2.5
  min_confidence: 0.40
  speed_m_s: 0.6
  # Не використовувати CV ряд для моніторингу (окремі камери)
  use_cv_frame: false

# Лише для mode: mock — демо-знахідки в симуляції
demo_findings_in_sim: true

storage:
  findings_file: data/monitoring/findings.json

# ──────────────────────────────────────────────────────────────────────────
# Оброблена ділянка при оприскуванні (GPS-трек + ширина смуги)
# Події sprayer_on/off → payload.spray_coverage на сервері; контекст зйомок
# ──────────────────────────────────────────────────────────────────────────
spray_coverage:
  enabled: true
  swath_width_m: 2.0          # ширина смуги оприскувача (м)
  sample_min_dist_m: 0.5        # мін. крок між GPS-точками треку
