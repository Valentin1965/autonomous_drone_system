# Computer vision — vineyard row navigation
# planner: hybrid = depth ряд + YOLOv8 перешкоди (людина, тварина, …)
planner: hybrid
# Зараз: відеофайли. Після збірки: source: oakd або webcam
source: video
video_dir: assets/videos
video_file: ""              # порожньо = перший .mp4/.avi у video_dir
webcam_index: 0
fallback_to_synthetic: true  # без .mp4 у assets/videos — синтетичний ряд для GCS/симуляції

model_dir: models
# Сегментація ряду (custom модель traversable/obstacle); для hybrid ряд = depth
default_model: yolov8s-seg.pt
confidence: 0.45
# YOLO: cpu для старих GPU (напр. MX130); auto = перевірка сумісності CUDA
yolo_device: auto

# YOLOv8 detect (COCO) — людина, тварина, транспорт у зоні руху попереду
hazard:
  enabled: true
  model: yolov8s.pt
  confidence: 0.40
  stop_area_ratio: 0.05
  min_box_area_ratio: 0.008
  classes:
    - person
    - bicycle
    - car
    - motorcycle
    - bus
    - truck
    - bird
    - cat
    - dog
    - horse
    - sheep
    - cow
    - elephant
    - bear
    - backpack
    - suitcase
    - bench
    - chair
  roi:
    x_margin: 0.12
    y_start: 0.18

motion:
  forward_speed: 0.70
  lateral_gain: 0.95
  obstacle_stop_threshold: 0.24
  depth_obstacle_stop_ratio: 0.32
  sprayer_row_tolerance: 0.12

classes:
  traversable: traversable
  obstacle: obstacle

stream_fps: 8

display:
  # false для WSL без X11; true якщо є WSLg або export DISPLAY=:0
  show_window: false
  window_title: Vineyard Row Navigation
