# Варіант 2 — CV на борту (RPi + Oak-D)
# Запуск: export CV_CONFIG=config/cv_rpi.yaml

planner: hybrid
source: oakd
video_dir: assets/videos
video_file: ""
webcam_index: 0
fallback_to_synthetic: false

model_dir: models
default_model: yolov8s-seg.pt
confidence: 0.45
yolo_device: auto

hazard:
  enabled: true
  model: yolov8s.pt
  confidence: 0.40
  stop_area_ratio: 0.05
  classes: [person, dog, cat, bird, horse, cow, sheep, bicycle, car, motorcycle]

depth:
  near_far_ratio: 0.55
  min_window_area: 2500
  min_window_area_ratio: 0.02
  center_band_ratio: 0.35
  obstacle_close_ratio: 0.32

motion:
  forward_speed: 0.70
  lateral_gain: 0.95
  obstacle_stop_threshold: 0.24
  depth_obstacle_stop_ratio: 0.32
  sprayer_row_tolerance: 0.12

stream_fps: 8

display:
  show_window: false
  window_title: Vineyard Row Navigation
