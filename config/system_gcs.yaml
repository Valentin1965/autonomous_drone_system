# Варіант 2 — станція керування (GCS) → Pixhawk по телеметрії
# Запуск: scripts/run_variant2_gcs.sh  або
#   export SYSTEM_CONFIG=config/system_gcs.yaml MAVLINK_PROFILE=px4
#   python main.py --web

deployment: variant_2
role: ground_station

vehicle:
  type: ground_rover
  default_frame: body

mavlink:
  active: px4
  # Розділення каналів варіант 2: GCS — лише radio; RPi — лише USB (див. docs/MAVLINK_VARIANT2.md)
  link: gcs_radio                      # gcs_radio | rpi_usb | sim
  connection_gcs: "udp:192.168.1.10:14550"   # SiK / Wi‑Fi телеметрія → Pixhawk
  connection_px4: "udp:192.168.1.10:14550"   # fallback
  connection_sim: "udp:127.0.0.1:14550"
  heartbeat_timeout: 5

simulator:
  connection_string: "udpin:0.0.0.0:14550"

offboard:
  rate_hz: 20

mission:
  file: "config/mission.yaml"
  # Поле: узгоджено з system_rpi.yaml (GPS + телеметрія)
  arrival_radius_m: 2.5
  poll_interval_s: 0.2
  goto_retry_s: 1.5
  default_speed_m_s: 1.0
  min_speed_m_s: 0.3
  max_speed_m_s: 3.0

web:
  host: "0.0.0.0"
  port: 8080
  telemetry_hz: 2
  security:
    api_key: "1995Alex20102"                        # поле: export GCS_API_KEY=...
    allow_localhost_without_auth: false
  tls:
    enabled: false                     # true + cert_file/key_file для HTTPS
    cert_file: config/certs/gcs.crt
    key_file: config/certs/gcs.key

logging:
  level: INFO
  log_dir: logs

# CV режим на станції:
# - local: CV запускається на GCS (кнопка "CV ряд")
# - onboard: CV працює на RPi; на GCS локальний трекер блокується (щоб не було "2 CV одночасно")
cv:
  mode: local   # local | onboard
