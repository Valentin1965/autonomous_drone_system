# ====================== YOLO TRACKER ======================
class YOLOTargetTracker:
    def __init__(self):
        self.running = False
        self.thread = None
        self.model = None
        self.cap = None
        
        self.use_fine_tuned = True           # За замовчуванням намагаємося використовувати fine-tuned
        self.target_class = "person"
        self.forward_speed = 0.65
        self.lateral_gain = 0.85
        self.center_tolerance = 0.12
        self.stop_area_threshold = 0.35

    def get_best_model_path(self):
        """Автоматично знаходить найновішу .pt модель у папці models/"""
        if not os.path.exists(MODELS_DIR):
            os.makedirs(MODELS_DIR)
            logger.info(f"Створено папку {MODELS_DIR}")

        pt_files = list(Path(MODELS_DIR).glob("*.pt"))
        
        if not pt_files:
            logger.warning("Папка models/ порожня. Використовуємо стандартну модель.")
            return "yolov8s.pt"

        # Сортуємо за часом модифікації (найновіший перший)
        best_model = max(pt_files, key=os.path.getmtime)
        logger.info(f"Знайдено найкращу модель: {best_model.name} (оновлена {time.ctime(best_model.stat().st_mtime)})")
        return str(best_model)

    def load_model(self):
        model_path = self.get_best_model_path() if self.use_fine_tuned else "yolov8s.pt"
        
        try:
            self.model = YOLO(model_path)
            logger.info(f"Модель успішно завантажена: {model_path}")
            return True
        except Exception as e:
            logger.error(f"Не вдалося завантажити модель {model_path}: {e}")
            if self.use_fine_tuned:
                logger.info("Спроба завантажити стандартну модель...")
                self.model = YOLO("yolov8s.pt")
            return False

    def start(self):
        if self.running:
            return {"status": "already_running"}
        
        if not self.model:
            self.load_model()

        self.running = True
        self.thread = threading.Thread(target=self._tracking_loop, daemon=True)
        self.thread.start()
        
        model_name = Path(self.get_best_model_path()).name if self.use_fine_tuned else "yolov8s.pt"
        logger.info(f"YOLO Tracker запущено | Модель: {model_name} | Клас: {self.target_class}")
        return {"status": "started", "model": model_name}

    def stop(self):
        self.running = False
        if self.thread and self.thread.is_alive():
            self.thread.join(timeout=2.0)
        self._send_stop()
        logger.info("YOLO Tracker зупинено")
        return {"status": "stopped"}

    def set_target_class(self, new_class):
        self.target_class = new_class
        logger.info(f"Цільовий клас змінено на: {new_class}")
        return {"status": "ok", "target_class": new_class}

    def _send_move(self, forward, lateral):
        try:
            requests.post("http://127.0.0.1:8080/api/move",
                          json={"forward": forward, "lateral": lateral, "yaw": 0},
                          timeout=0.12)
        except:
            pass

    def _send_stop(self):
        try:
            requests.post("http://127.0.0.1:8080/api/stop", timeout=0.12)
        except:
            pass

    def _tracking_loop(self):
        try:
            self.cap = cv2.VideoCapture(0)
            if not self.cap.isOpened():
                logger.error("Камера не відкрита!")
                return

            while self.running:
                ret, frame = self.cap.read()
                if not ret:
                    break

                h, w = frame.shape[:2]
                cx_frame = w / 2

                results = self.model(frame, verbose=False)
                best_target = None
                best_area = 0

                for r in results:
                    for b in r.boxes:
                        cls_name = self.model.names[int(b.cls[0])]
                        x1, y1, x2, y2 = b.xyxy[0].tolist()
                        area_norm = (x2 - x1) * (y2 - y1) / (w * h)

                        if cls_name == self.target_class and area_norm > best_area:
                            best_area = area_norm
                            best_target = (x1, y1, x2, y2)

                if best_target and best_area > self.stop_area_threshold:
                    self._send_stop()
                    cv2.putText(frame, "STOP - Кінець ряду!", (50, 70),
                                cv2.FONT_HERSHEY_SIMPLEX, 1.4, (0, 0, 255), 4)
                elif best_target:
                    x1, y1, x2, y2 = best_target
                    cx = (x1 + x2) / 2
                    offset = (cx - cx_frame) / cx_frame

                    forward = self.forward_speed * (0.65 if abs(offset) > self.center_tolerance else 1.0)
                    lateral = -offset * self.lateral_gain

                    self._send_move(max(-1.0, min(1.0, forward)), 
                                  max(-1.0, min(1.0, lateral)))

                    cv2.rectangle(frame, (int(x1), int(y1)), (int(x2), int(y2)), (0, 255, 0), 3)
                else:
                    self._send_stop()

                cv2.imshow("YOLO Tracker - Fine-tuned", frame)
                if cv2.waitKey(1) & 0xFF == 27:
                    break

        except Exception as e:
            logger.error(f"Tracker error: {e}")
        finally:
            self._send_stop()
            if self.cap:
                self.cap.release()
            cv2.destroyAllWindows()
            self.running = False


tracker = YOLOTargetTracker()

# ====================== MAVLINK + API ======================
CONTROL_MODE = "earth"
MAX_SPEED = 1.5

def now_ms():
    return int((time.time() * 1000) % (2**32))

def send_velocity_body(forward, lateral):
    # Простий варіант (можеш розширити)
    m = conn.master
    m.mav.set_position_target_local_ned_send(
        now_ms(), m.target_system, m.target_component,
        mavutil.mavlink.MAV_FRAME_BODY_NED,
        0b0000111111000111, 0, 0, 0,
        forward * MAX_SPEED, lateral * MAX_SPEED, 0,
        0, 0, 0, 0, 0
    )

def stop_motion():
    send_velocity_body(0, 0)

@app.route("/api/start_tracking", methods=["POST"])
def api_start_tracking():
    return jsonify(tracker.start())

@app.route("/api/stop_tracking", methods=["POST"])
def api_stop_tracking():
    return jsonify(tracker.stop())

@app.route("/api/set_target_class", methods=["POST"])
def api_set_target_class():
    cls = request.json.get("class", "person")
    return jsonify(tracker.set_target_class(cls))

