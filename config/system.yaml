vehicle:
  type: ground_rover
  default_frame: body   # body | earth — /api/set_mode

# MAVLink: sim = PixhawkGPSSimulator, px4 = реальний / SITL автопілот
mavlink:
  active: sim           # sim | px4  (або env MAVLINK_PROFILE=px4)
  connection_sim: "udp:127.0.0.1:14550"
  connection_px4: "udp:127.0.0.1:14550"
  connection_string: "udp:127.0.0.1:14550"   # fallback
  heartbeat_timeout: 5

simulator:
  connection_string: "udpin:0.0.0.0:14550"

offboard:
  rate_hz: 20
  default_altitude: 3.0

mission:
  file: "config/mission.yaml"

web:
  host: "0.0.0.0"
  port: 8080
  telemetry_hz: 2
