[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q --tb=short
markers =
    slow: needs ultralytics/torch (optional local run)

# ROS Humble у PYTHONPATH: не запускайте просто `pytest`.
#   bash scripts/run_tests.sh
# або:
#   PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 DRONE_SIM_INTERACTIVE=0 pytest tests/ -q
