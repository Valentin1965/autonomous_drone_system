name: Python tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pytest-light:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (light)
        run: pip install -r requirements-ci-light.txt

      - name: Run tests (no ROS pytest plugins)
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          DRONE_SIM_INTERACTIVE: "0"
        run: bash scripts/run_tests.sh

      - name: Flake8 (core packages)
        run: |
          flake8 main.py mavlink web/state.py web/motion_bridge.py \
                 web/routes/motion.py simulator/pixhawk_simulator.py \
                 --max-line-length=120 --ignore=E501,W503 || true
